<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360" role="img" aria-label="FDE-os flywheel: Articles to Course to Toolkit to Community, with field stories feeding the next articles">
  <rect x="1" y="1" width="878" height="358" rx="16" fill="#F0EEE6" stroke="#E2DDD0"/>
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" fill="#1A1A18">
    <text x="40" y="50" font-size="25" font-weight="600">One flywheel, three objectives</text>
    <text x="40" y="76" font-size="14" fill="#6E6A62">Delta content ignites the loop — writing the series builds the toolkit and seeds the community.</text>

    <!-- nodes -->
    <g>
      <rect x="40"  y="120" width="170" height="72" rx="12" fill="#FBFAF6" stroke="#D8D2C4" stroke-width="1.5"/>
      <text x="125" y="152" font-size="17" font-weight="600" text-anchor="middle">Articles</text>
      <text x="125" y="173" font-size="11.5" fill="#6E6A62" text-anchor="middle">Delta series · the ignition</text>

      <rect x="250" y="120" width="170" height="72" rx="12" fill="#FBFAF6" stroke="#D8D2C4" stroke-width="1.5"/>
      <text x="335" y="152" font-size="17" font-weight="600" text-anchor="middle">Course</text>
      <text x="335" y="173" font-size="11.5" fill="#6E6A62" text-anchor="middle">Objective 1 · JD-validated</text>

      <rect x="460" y="120" width="170" height="72" rx="12" fill="#FBFAF6" stroke="#D8D2C4" stroke-width="1.5"/>
      <text x="545" y="152" font-size="17" font-weight="600" text-anchor="middle">Toolkit</text>
      <text x="545" y="173" font-size="11.5" fill="#6E6A62" text-anchor="middle">Objective 2 · agent skills</text>

      <rect x="670" y="120" width="170" height="72" rx="12" fill="#FBFAF6" stroke="#D8D2C4" stroke-width="1.5"/>
      <text x="755" y="152" font-size="17" font-weight="600" text-anchor="middle">Community</text>
      <text x="755" y="173" font-size="11.5" fill="#6E6A62" text-anchor="middle">Objective 3 · the hub</text>
    </g>

    <!-- forward arrows -->
    <g stroke="#C26B49" stroke-width="2.5" fill="#C26B49">
      <line x1="214" y1="156" x2="242" y2="156"/><polygon points="242,151 252,156 242,161"/>
      <line x1="424" y1="156" x2="452" y2="156"/><polygon points="452,151 462,156 452,161"/>
      <line x1="634" y1="156" x2="662" y2="156"/><polygon points="662,151 672,156 662,161"/>
    </g>

    <!-- return loop -->
    <path d="M755,192 C 755,300 125,300 125,196" fill="none" stroke="#C9805F" stroke-width="2.5" stroke-dasharray="2 6" stroke-linecap="round"/>
    <polygon points="120,206 125,190 130,206" fill="#C9805F"/>
    <rect x="288" y="286" width="304" height="26" rx="13" fill="#EAD3C6"/>
    <text x="440" y="303" font-size="12.5" font-weight="600" fill="#9B4B2C" text-anchor="middle">field stories become the next articles — content IS product</text>
  </g>
</svg>
